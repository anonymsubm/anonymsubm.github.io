<!doctype html>
<meta charset="utf-8">
<title>Sink-aligned reader</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; background: #0e0e10; color: #e8e8ea;
    font: 16px/1.6 -apple-system, system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid #2a2a2e;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  h1 { font-size: 14px; font-weight: 600; margin: 0; color: #a0a0a8; letter-spacing: .03em; }
  audio { height: 34px; }
  .legend { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
  .bar { width: 90px; height: 10px; border-radius: 3px;
         background: linear-gradient(90deg,#1a1a2e,#7b2d6b,#e0913a,#ffe066); }
  #text {
    flex: 1; overflow-y: auto; padding: 30px 22px 50vh;
    font-size: 19px; line-height: 2.0;
  }
  .tok {
    border-radius: 3px; cursor: pointer;
    background: transparent; transition: background .08s linear;
    white-space: pre-wrap;     /* whitespace tokens keep their width; lines still wrap */
  }
  .tok.current { color: #fff; }
  .tok.future  { opacity: .35; }
  footer { padding: 8px 20px; font-size: 12px; color: #555; border-top: 1px solid #2a2a2e; }
</style>

<header>
  <h1>SINK-ALIGNED READER</h1>
  <audio id="audio" src="audio.wav" controls></audio>
  <div class="legend"><span>low sink</span><div class="bar"></div><span>high sink</span></div>
  <label class="legend"><input type="checkbox" id="follow" checked> auto-scroll</label>
  <label class="legend">offset
    <input type="number" id="offset" value="0.1" step="0.05" style="width:64px"> s
  </label>
</header>

<div id="text">loading…</div>

<footer id="status"></footer>

<script>
// ---- sink score (0..1) -> rgba color, 4-stop ramp matching the legend ----
function sinkColor(s, alpha) {
  const stops = [[26,26,46],[123,45,107],[224,145,58],[255,224,102]];
  const x = Math.max(0, Math.min(1, s)) * (stops.length - 1);
  const i = Math.floor(x), f = x - i;
  const a = stops[i], b = stops[Math.min(i+1, stops.length-1)];
  const c = a.map((v,k) => Math.round(v + (b[k]-v)*f));
  return `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
}

let DATA = null, spans = [];
let lastStep = -1, lastCur = -1;

fetch("karaoke.json")
  .then(r => r.json())
  .then(d => { DATA = d; build(); })
  .catch(e => {
    document.getElementById("text").textContent =
      "could not load karaoke.json — keep it in the same folder and serve over http.";
    console.error(e);
  });

function build() {
  const box = document.getElementById("text");
  box.innerHTML = "";
  DATA.tokens.forEach((tok, i) => {
    const span = document.createElement("span");
    span.className = "tok future";
    // render verbatim: whitespace is its own token, so don't trim and
    // don't add spaces — the stream already has the spacing it needs
    span.textContent = tok;
    span.title = `t=${DATA.start[i].toFixed(2)}s`;
    span.onclick = () => {
      const offset = parseFloat(offsetEl.value) || 0;
      audio.currentTime = Math.max(0, DATA.start[i] - offset);
      audio.play();
    };
    box.appendChild(span);
    spans.push(span);
  });
  document.getElementById("status").textContent =
    `${DATA.tokens.length} tokens · ${DATA.step_time.length} steps · `
    + `${DATA.duration.toFixed(1)}s · sink raw `
    + `${DATA.sink_raw_range[0].toFixed(3)}–${DATA.sink_raw_range[1].toFixed(3)}`;
}

// binary search: latest step whose step_time <= time
function stepAt(time) {
  const st = DATA.step_time;
  let lo = 0, hi = st.length - 1, ans = 0;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (st[mid] <= time) { ans = mid; lo = mid + 1; }
    else hi = mid - 1;
  }
  return ans;
}

const audio   = document.getElementById("audio");
const follow  = document.getElementById("follow");
const offsetEl = document.getElementById("offset");

// changing the offset can jump the active step in either direction,
// so force a full recolor on the next frame by resetting lastStep
offsetEl.addEventListener("input", () => { lastStep = -1; lastCur = -1;
  spans.forEach(sp => { sp.style.background = "transparent";
    sp.classList.add("future"); sp.classList.remove("current"); }); });

function render() {
  if (!DATA) { requestAnimationFrame(render); return; }
  // positive offset: alignment runs behind audio -> look further ahead
  const offset = parseFloat(offsetEl.value) || 0;
  const step = stepAt(audio.currentTime + offset);

  if (step !== lastStep) {
    if (step > lastStep) {
      // advanced: color every step we just passed (handles skipped frames)
      for (let s = lastStep + 1; s <= step; s++) {
        const tok = DATA.step_tok[s];
        const sink = DATA.step_sink[s];
        // a step covers the stride-2 pair: tok and tok+1
        for (const ti of [tok, tok + 1]) {
          if (ti < spans.length) {
            spans[ti].style.background = sinkColor(sink, 0.6);
            spans[ti].classList.remove("future");
          }
        }
      }
    } else {
      // scrubbed backwards: recolor from scratch up to `step`
      spans.forEach(sp => {
        sp.style.background = "transparent";
        sp.classList.add("future");
        sp.classList.remove("current");
      });
      for (let s = 0; s <= step; s++) {
        const tok = DATA.step_tok[s], sink = DATA.step_sink[s];
        for (const ti of [tok, tok + 1]) {
          if (ti < spans.length) {
            spans[ti].style.background = sinkColor(sink, 0.6);
            spans[ti].classList.remove("future");
          }
        }
      }
    }

    // no-trail: fade everything except the current region
    for (let s = 0; s < step - 1; s++) {
      const tok = DATA.step_tok[s];
      for (const ti of [tok, tok + 1])
        if (ti < spans.length) spans[ti].style.background = "transparent";
    }

    // move the "current" outline
    const cur = DATA.step_tok[step];
    if (cur !== lastCur) {
      if (lastCur >= 0 && lastCur < spans.length) spans[lastCur].classList.remove("current");
      if (cur < spans.length) {
        spans[cur].classList.add("current");
        if (follow.checked)
          spans[cur].scrollIntoView({ block: "center", behavior: "smooth" });
      }
      lastCur = cur;
    }
    lastStep = step;
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
